services:
  - type: web
    name: openclaw-xhs-simon200401
    runtime: python
    plan: free
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --app-dir .
    healthCheckPath: /healthz
